title: Project Defense Preparation
decks:
  - id: portfolio-theory
    name: Portfolio Theory
    cards:
      - question: "Почему для перевода средней дневной доходности в годовую вы умножаете на 252, а для волатильности - на sqrt(252)? Почему нельзя и волатильность тоже просто умножить на 252?"
        answer: "Средняя доходность масштабируется линейно по времени, поэтому годовая ожидаемая доходность равна примерно 252 дневным средним доходностям. Волатильность связана не с суммой, а с дисперсией: дисперсия растет пропорционально времени, а стандартное отклонение, то есть волатильность, растет как корень из времени. Поэтому годовая волатильность равна дневной, умноженной на sqrt(252)."
      - question: "Что именно означает ожидаемая доходность портфеля: гарантированный результат в следующем году или оценка на основе прошлых данных? Почему это принципиально разные вещи?"
        answer: "Это не гарантия, а оценка, построенная по историческим данным. Она показывает, какой результат мы бы ожидали в среднем при сохранении прошлых закономерностей. Реальная доходность почти наверняка будет другой, потому что рынок случаен и параметры со временем меняются."
      - question: "Если две акции имеют одинаковую ожидаемую доходность и одинаковую волатильность, зачем вообще смотреть на их корреляцию при составлении портфеля?"
        answer: "Потому что риск портфеля зависит не только от рисков отдельных активов, но и от того, как они двигаются вместе. Если корреляция низкая или отрицательная, их совместное включение может заметно снизить риск портфеля без потери ожидаемой доходности. Именно в этом смысл диверсификации."
      - question: "В чем содержательная разница между корреляцией и ковариацией? Почему в формуле волатильности портфеля обычно появляется именно ковариационная матрица, а не матрица корреляций?"
        answer: "Корреляция показывает силу и направление линейной связи в безразмерной шкале от -1 до 1. Ковариация тоже описывает совместное движение, но сохраняет масштаб случайных величин. В формуле риска портфеля нужны именно реальные масштабы колебаний активов, поэтому используется ковариационная матрица. Корреляции недостаточно, если не учитывать собственные волатильности активов."
      - question: "Почему портфель может иметь риск ниже, чем риск каждой отдельной акции в нем? За счет какого механизма это происходит математически?"
        answer: "Потому что колебания разных активов могут частично компенсировать друг друга. Математически это видно из смешанных членов в формуле дисперсии портфеля, где участвуют ковариации. Если ковариации не слишком большие, а особенно если они отрицательные, итоговая дисперсия портфеля снижается."
      - question: "Что означает точка на эффективном фронтире? Почему любая точка ниже или правее фронтира считается неэффективной?"
        answer: "Точка на эффективном фронтире соответствует портфелю с минимально возможной волатильностью для данной ожидаемой доходности. Портфели вне фронтира хуже по критерию риск-доходность. Если точка лежит правее или выше подходящей точки фронтира, значит существует другой портфель с той же доходностью и меньшим риском или с тем же риском и большей доходностью."
      - question: "Почему при фиксированной целевой доходности оптимизационная задача формулируется как минимизация волатильности, а не максимизация доходности?"
        answer: "Потому что доходность уже зафиксирована ограничением задачи. Среди всех портфелей, которые дают нужную ожидаемую доходность, инвестору рационально выбрать самый надежный, то есть с минимальным риском. Если начать максимизировать доходность, то это уже будет другая постановка."
      - question: "Какие ограничения на веса портфеля были в модели без short sales? Как экономически интерпретируются условия sum(w_i)=1 и w_i >= 0?"
        answer: "В модели без short sales было два основных ограничения: сумма весов равна 1 и все веса неотрицательны. Первое означает, что весь капитал полностью распределен между активами. Второе означает, что мы только покупаем активы и не открываем короткие позиции."
      - question: "Почему максимально возможная доходность портфеля без short sales достигается вложением всего капитала в один актив с наибольшей ожидаемой доходностью?"
        answer: "Потому что ожидаемая доходность портфеля без short sales является выпуклой комбинацией доходностей отдельных активов. Значит она не может превышать максимум среди этих доходностей. Чтобы достичь этого максимума, нужно положить весь вес в актив с наибольшей ожидаемой доходностью."
      - question: "Можно ли считать, что если актив имел лучшую доходность в 2018 году, то его разумно взять с максимальным весом и в 2019 году? Почему такой вывод может быть ошибочным?"
        answer: "Нет, это слишком сильный вывод. Лучшая историческая доходность не гарантирует лучшую будущую доходность, а еще такой актив может иметь высокий риск. Кроме того, оптимальный портфель учитывает не только доходность актива, но и его взаимодействие с остальными активами через ковариации."
      - question: "В чем смысл использования данных именно 2018 года для построения портфеля на 2019 год? Почему нельзя использовать сразу данные 2019 года при оценке ожидаемых характеристик?"
        answer: "Мы имитируем реальную ситуацию принятия решения в конце 2018 года, когда будущее еще неизвестно. Если использовать данные 2019 года для построения портфеля на 2019 год, это будет подглядывание в будущее. Такой подход дает нереалистично хорошую оценку качества стратегии."
      - question: "Что изменяется в математической постановке задачи, когда разрешаются short-позиции? Какие ограничения исчезают, а какие остаются?"
        answer: "Исчезает ограничение неотрицательности весов, то есть теперь веса могут быть как положительными, так и отрицательными. При этом обычно сохраняются ограничения на суммарный бюджет и на целевую ожидаемую доходность. То есть сумма весов остается равной 1, а требуемая доходность по-прежнему фиксируется."
      - question: "Почему при наличии short sales веса портфеля могут быть отрицательными, но их сумма все равно равна 1? Как это интерпретировать финансово?"
        answer: "Отрицательный вес означает, что по этому активу открыта короткая позиция. Сумма весов равна 1, потому что мы по-прежнему описываем распределение собственного капитала инвестора с учетом длинных и коротких позиций. Короткая продажа дает дополнительные средства на покупку других активов, но бюджетное ограничение модели сохраняется."
      - question: "Почему разрешение short sales может одновременно увеличить достижимую доходность и уменьшить риск? Разве шорт не делает стратегию всегда более опасной?"
        answer: "Short sales расширяют множество допустимых портфелей, поэтому оптимизатор получает больше свободы. За счет этого можно сильнее хеджировать риски и строить комбинации, которые без short были недоступны. Но на практике short действительно может нести дополнительные риски и издержки, просто в базовой математической модели они не учитываются."
      - question: "Что в вашей модели означает short-позиция на практике: откуда берется актив, который вы продаете, если он вам не принадлежит?"
        answer: "На практике актив берется взаймы у брокера или другого держателя бумаги, затем продается на рынке. Позже инвестор обязан выкупить этот актив и вернуть его. Прибыль возникает, если цена успела снизиться, а убыток - если выросла."
      - question: "Почему в коде для расчета волатильности портфеля используется выражение вида w^T Sigma w? Что именно возвращает эта квадратичная форма?"
        answer: "Выражение w^T Sigma w возвращает дисперсию доходности портфеля. В нем автоматически учитываются и индивидуальные дисперсии активов, и все попарные ковариации. Чтобы получить волатильность, то есть стандартное отклонение, из этой величины берут квадратный корень."
      - question: "При каких свойствах матрицы Sigma задача минимизации волатильности является выпуклой, и почему это важно для cvxpy?"
        answer: "Нужно, чтобы ковариационная матрица была симметричной и неотрицательно полуопределенной. Тогда квадратичная форма задает выпуклую функцию риска. Для cvxpy это важно, потому что выпуклые задачи надежно решаются до глобального оптимума, а не до случайного локального решения."
      - question: "Если фактическая доходность и волатильность портфеля в 2019 году сильно отличаются от прогнозных значений, это означает, что модель плохая? Или такое расхождение нормально?"
        answer: "Само по себе это нормально. Модель строится на исторических оценках, а рынок в будущем может вести себя иначе. Большое расхождение не обязательно означает плохую модель, но показывает, что параметры нестабильны и портфель нужно регулярно переоценивать."
      - question: "Какой портфель называют глобальным минимумом дисперсии, и обязательно ли он лежит на эффективной части фронтира для любого инвестора?"
        answer: "Это портфель с наименьшей возможной волатильностью среди всех допустимых портфелей. Он является крайней левой точкой множества достижимых портфелей. На эффективном фронтире для стандартной модели находится только верхняя ветвь над этой точкой, потому что ниже по доходности при том же риске можно выбрать портфель лучше."
      - question: "Если на защите попросят объяснить Sharpe ratio, как вы свяжете его с уже построенным фронтиром и почему портфель с максимальной доходностью не обязан иметь лучший Sharpe ratio?"
        answer: "Sharpe ratio измеряет доходность на единицу риска, обычно как разность между доходностью портфеля и безрисковой ставкой, деленную на волатильность. На фронтире он помогает выбрать не просто самый доходный, а наиболее эффективный по соотношению риск-доходность портфель. Портфель с максимальной доходностью может иметь слишком большой риск, поэтому его Sharpe ratio может быть хуже, чем у более умеренного портфеля."
